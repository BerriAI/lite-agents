# Quickstart: `docker compose up --build`
#
# Brings up:
#   - db    : Postgres 16, with migrations/001_tasks.sql auto-applied on
#             first boot (mounted into /docker-entrypoint-initdb.d).
#   - agent : the FastAPI server, depends on db, exposes 8787.
#
# Set LITELLM_API_BASE / LITELLM_API_KEY in .env (or your shell env)
# before `docker compose up`. Memory and MCP still live on your
# external LiteLLM proxy — this compose file only bundles Postgres for
# the agent's own deferred-tasks state.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d:ro
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent"]
      interval: 5s
      timeout: 3s
      retries: 10

  agent:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      LITELLM_API_BASE: ${LITELLM_API_BASE:?set LITELLM_API_BASE in .env}
      LITELLM_API_KEY: ${LITELLM_API_KEY:?set LITELLM_API_KEY in .env}
      LITELLM_MODEL: ${LITELLM_MODEL:-claude-sonnet-4-6}
      AGENT_ID: ${AGENT_ID:-agent}
      ENABLE_TASKS: "1"
      DATABASE_URL: postgresql://agent:agent@db:5432/agent
      HOST: 0.0.0.0
      PORT: "8787"
      MCP_SERVERS: ${MCP_SERVERS:-}
      UI_USERNAME: ${UI_USERNAME:-}
      UI_PASSWORD: ${UI_PASSWORD:-}
      AGENT_API_KEYS: ${AGENT_API_KEYS:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    ports:
      - "8787:8787"

volumes:
  db-data:
